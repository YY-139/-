<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>デジタルフロアマップ</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

#map-container{
    position:relative;
    width:100vw;
    margin:auto;
}

#map{
    width:100%;
    display:block;
}

/* 教室ボタン */
.room{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
}

/* ポップアップ */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    z-index:999;
}

.modal-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:90vw;
    max-height:85vh;
    width:auto;
    height:auto;
    display:block;
    margin:auto;
    border-radius:10px;
}

.modal-content img{
    width:100%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    color:white;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="map-container">

<img src="floormap2.png" id="map">

<!-- 501 -->

style="

width:12%;

</div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">×</div>

<div class="modal-content">
<img id="modalImage">
</div>

</div>

<script>
function openModal(img){
    document.getElementById("modal").style.display="block";
    document.getElementById("modalImage").src=img;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}
</script>
